<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vending Pro - Consell Comarcal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --orange: #e65100; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background-color: var(--bg); color: #333; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px; }
        h1 { color: var(--blue); font-size: 1.1rem; text-align: center; margin: 0; }
        
        .prep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .prep-item { background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #d1e3fa; }
        .prep-label { font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .prep-val { font-size: 1rem; font-weight: bold; color: var(--blue); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f8f9fa; color: #666; font-size: 0.65rem; padding: 8px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px 5px; }
        
        .stock-input { width: 45px; padding: 8px; border: 2px solid var(--blue); border-radius: 6px; text-align: center; font-weight: bold; font-size: 1rem; }
        .badge-estancado { background: #fff3e0; color: var(--orange); border: 1px solid #ffe0b2; padding: 3px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; display: block; margin-top: 4px; text-align: center; }
        
        #modalScanner { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; color:white; text-align:center; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        
        .btn-save { width:100%; padding:18px; background: var(--blue); color:white; border:none; border-radius:12px; font-weight:bold; font-size: 1.1rem; margin-top:10px; }
        .btn-qr { width:100%; padding:15px; background: #333; color:white; border:none; border-radius:12px; margin: 15px 0; font-weight:bold; }
        .btn-cancel { margin: 20px; padding: 10px 20px; background: #cc0000; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="modalScanner">
    <h3 style="margin-top:20px;">📷 ESCANEANDO BOLSA</h3>
    <div id="reader"></div>
    <button class="btn-cancel" onclick="cerrarScanner()">CERRAR CÁMARA</button>
</div>

<div class="card">
    <h1>📦 Reposición Consell Comarcal</h1>
    <input type="file" id="fileInput" accept=".txt" style="margin-top:10px; width:100%;">
</div>

<div id="resultado" style="display:none;">
    <div class="card" style="background: #e8f0fe; border: 1px solid var(--blue);">
        <h3 style="font-size:0.8rem; margin:0 0 10px 0;">🚚 CARGA DE TOLVAS (GRAMOS)</h3>
        <div id="informeGramajes" class="prep-grid"></div>
    </div>

    <div class="card">
        <span id="nombreCliente" style="color:var(--blue); font-weight:bold; font-size:1.1rem;">---</span>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th style="text-align:center;">Vendido</th>
                    <th style="text-align:center;">Cargar</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>

        <button class="btn-qr" onclick="abrirScanner()">📷 ESCANEAR QR BOLSA RECAUDACIÓN</button>
        <div id="qr-result" style="text-align:center; color:#1e8e3e; font-weight:bold; margin-bottom:15px; font-size:1.1rem;"></div>
        
        <button class="btn-save" onclick="alert('Datos Guardados Localmente')">FINALIZAR Y GUARDAR</button>
    </div>
</div>

<script>
const productosNombres = {
    "001": "Espresso", "002": "Cafe Largo", "003": "Cafe Cortado", "004": "Cafe con leche", "005": "Capuchino", "006": "Mocachino", "007": "Leche Manchada",
    "008": "Espresso Desc.", "009": "Largo Desc.", "010": "Cortado Desc.", "011": "C. Leche Desc.", "012": "Capu Desc.", "013": "Moca Desc.", "014": "Manchada Desc.",
    "015": "Leche", "016": "Te al Limon", "017": "Capuchino Avellana", "018": "Capuchino Vainilla", "019": "Irish Coffe", "020": "Chocolate", "021": "Choco Leche",
    "023": "Chips Ahoy", "024": "Croissant", "025": "Galleta Colacao", "026": "Donettes", "027": "M&M Cacahuete", "028": "Haribo Favoritos", 
    "070": "Ens. Pasta Atun", "071": "Lasaña Boloñesa", "072": "Macarrones Boloñ.", "073": "Ens. Arroz", "074": "Fideuá 250g", "075": "Albóndigas Tomate", 
    "076": "Ternera Jardinera", "077": "Ens. Pasta Jamon", "078": "Bifrutas Medit.", "079": "Bifrutas Pacif.", "080": "Bifrutas Tropi.", "081": "Bifrutas Ibiza", 
    "082": "Cacaolat", "083": "Batido Vainilla", "084": "Agua Bezoya", "085": "Coca-Cola Zero", "086": "Coca-Cola 330ml", 
    "087": "Fanta Naranja", "088": "Fanta Limón", "089": "Aquarius Naranja", "090": "Aquarius Limón"
};

let html5QrCode = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() { procesar(reader.result); };
    reader.readAsText(e.target.files[0]);
});

function procesar(data) {
    const lineas = data.split('\n');
    let datosArchivo = {}; 
    let totales = { cafe: 0, leche: 0, choco: 0, desc: 0 };
    const hoy = new Date();

    lineas.forEach(linea => {
        const c = linea.split('*');
        if (c[0] === "CA1") document.getElementById('nombreCliente').innerText = "Cliente: " + c[1].trim();
        if (c[0] === "LA1") {
            const id = c[2].trim();
            const uds = parseInt(c[4], 10);
            const fechaDEX = c[5]; // DDMMYY de la última venta
            
            let esEstancado = false;
            if (uds === 0 && fechaDEX && fechaDEX.length === 6) {
                const d = parseInt(fechaDEX.substring(0,2));
                const m = parseInt(fechaDEX.substring(2,4)) - 1;
                const y = 2000 + parseInt(fechaDEX.substring(4,6));
                const fVenta = new Date(y, m, d);
                const diff = (hoy - fVenta) / (1000 * 60 * 60 * 24);
                if (diff > 30) esEstancado = true;
            }

            datosArchivo[id] = { uds, esEstancado };

            const idN = parseInt(id, 10);
            if (uds > 0) {
                if (idN >= 1 && idN <= 7) totales.cafe += (uds * 8);
                if (idN >= 8 && idN <= 14) totales.desc += (uds * 1.4);
                if ([3,5,10,12,15,21].includes(idN)) totales.leche += (uds * 5);
                if (idN === 20) totales.choco += (uds * 17);
            }
        }
    });

    document.getElementById('informeGramajes').innerHTML = `
        <div class="prep-item"><span class="prep-label">Café Grano</span><br><span class="prep-val">${totales.cafe}g</span></div>
        <div class="prep-item"><span class="prep-label">Leche Polvo</span><br><span class="prep-val">${totales.leche}g</span></div>
        <div class="prep-item"><span class="prep-label">Chocolate</span><br><span class="prep-val">${totales.choco}g</span></div>
        <div class="prep-item"><span class="prep-label">Descaf.</span><br><span class="prep-val">${totales.desc.toFixed(1)}g</span></div>
    `;

    let listaFinal = [];
    Object.keys(productosNombres).forEach(codigo => {
        const info = datosArchivo[codigo] || { uds: 0, esEstancado: false };
        listaFinal.push({
            id: codigo,
            idNum: parseInt(codigo, 10),
            nombre: productosNombres[codigo],
            uds: info.uds,
            estancado: info.esEstancado
        });
    });

    // Orden: Vendidos > Sólidos > Cafetería
    listaFinal.sort((a, b) => {
        const aEsCaf = a.idNum <= 21;
        const bEsCaf = b.idNum <= 21;
        if (a.uds > 0 && b.uds === 0) return -1;
        if (a.uds === 0 && b.uds > 0) return 1;
        if (aEsCaf && !bEsCaf) return 1;
        if (!aEsCaf && bEsCaf) return -1;
        return a.idNum - b.idNum;
    });

    const tbody = document.getElementById('tablaVentas');
    tbody.innerHTML = "";
    listaFinal.forEach(p => {
        const tr = document.createElement('tr');
        const esCaf = p.idNum <= 21;
        if (esCaf) tr.style.backgroundColor = "#f2f2f2";
        
        const badgeEst = p.estancado ? `<span class="badge-estancado">⚠️ ESTANCADO >30D</span>` : "";

        tr.innerHTML = `
            <td><b>${p.nombre}</b><br><small style="color:#999">Pos: ${p.id}</small>${badgeEst}</td>
            <td style="text-align:center; font-weight:bold; color:${p.uds > 0 ? 'red' : '#999'}">${p.uds}</td>
            <td style="text-align:center">${esCaf ? '-' : `<input type="number" class="stock-input" value="${p.uds}">`}</td>
        `;
        tbody.appendChild(tr);
    });
    document.getElementById('resultado').style.display = "block";
}

function abrirScanner() {
    document.getElementById('modalScanner').style.display = "block";
    html5QrCode = new Html5QrCode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        document.getElementById('qr-result').innerText = "✅ BOLSA: " + text;
        cerrarScanner();
    }).catch(err => console.error(err));
}

function cerrarScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('modalScanner').style.display = "none";
            html5QrCode = null;
        }).catch(() => document.getElementById('modalScanner').style.display = "none");
    } else {
        document.getElementById('modalScanner').style.display = "none";
    }
}
</script>
</body>
</html>
