<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Vending Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f4f7f9; color: #333; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { color: #1a73e8; font-size: 1.2rem; text-align: center; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: left; }
        th { color: #666; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
        
        .stock-input { width: 40px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; background: #fffde7; }
        .status-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; white-space: nowrap; }
        .alerta-mes { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .ok { background: #e8f5e9; color: #2e7d32; }
        
        .success { color: #1e8e3e; font-weight: bold; font-size: 1.1rem; }
        .cliente-header { color: #1a73e8; font-weight: bold; font-size: 1.1rem; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .btn-save { margin-top:15px; width:100%; padding:12px; background:#1a73e8; color:white; border:none; border-radius:8px; font-weight:bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>📊 Control de Reposición</h1>
    <input type="file" id="fileInput" accept=".txt" style="margin-top:15px; width:100%;">
</div>

<div id="resultado" style="display:none;">
    <div class="card">
        <p>🏢 Cliente: <span id="nombreCliente" class="cliente-header">---</span></p>
        <p>💰 Efectivo en Caja: <span id="recaudacion" class="success">0.00</span>€</p>
        <div id="cambioStatus"></div>
    </div>

    <div class="card">
        <h3>📦 Lista de Carga y Stock</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Vend.</th>
                        <th>Cargar</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
        <button class="btn-save" onclick="guardarDatos()">Guardar y Cerrar Cierre</button>
    </div>

    <div class="card">
        <h3>📷 Escanear Bolsa</h3>
        <div id="reader"></div>
        <p id="qr-result" style="text-align:center; font-weight:bold; color:#1a73e8; margin-top:10px;"></p>
    </div>
</div>

<script>
// MAPA DE CLIENTES (Número de serie -> Nombre Real)
const clientesMap = {
    "J9190400006F": "Consell Comarcal",
    "SERIE_OTRA_MAQUINA": "Empresa Ejemplo 2"
};

// DICCIONARIO DE PRODUCTOS
const productosNombres = {
    "001": "Ristreto/Espresso", "002": "Cafe Largo", "003": "Cafe Cortado", "004": "Cafe con leche", "005": "Capuchino", "006": "Mocachino", "007": "Leche Manchada", "008": "Espresso (Desc.)", "009": "Largo (Desc.)", "010": "Cortado (Desc.)", "011": "C. Leche (Desc.)", "012": "Capuchino (Desc.)", "013": "Mocachino (Desc.)", "014": "L. Manchada (Desc.)", "015": "Leche", "016": "Te al Limon", "017": "Capuchino Avellana", "018": "Capuchino Vainilla", "019": "Irish Coffe", "020": "Chocolate", "021": "Choco Leche", "022": "Caña Choco", "023": "Chips Ahoy 40g", "024": "Croissant 65g", "025": "Galleta Colacao", "026": "Donettes 95g", "027": "M&M Cacahuete", "028": "Haribo Favoritos", "029": "Filipinos Blancos", "030": "Filipinos Negros", "031": "Galleta Gorriaga", "032": "Huesitos x2", "033": "Kinder Bueno", "034": "Kit Kat", "035": "Mikado", "036": "Oreo 66g", "037": "Yoo-Hoo Gofre", "038": "Tokke 46g", "039": "Trident Gragea", "040": "Twix 50g", "041": "Natwins Fresa", "042": "Palmeritas Choco", "043": "Wafer Balconi", "044": "Mini Cookies Nocilla", "045": "Halls Azul", "046": "Mr. Brownie", "047": "All Bran Bizcocho", "048": "Fitness Barrita", "049": "Digestive Manzana", "050": "Vitalday Yogurt", "051": "Sante Crispy", "052": "Manzana Desid.", "053": "Gullon Vitalday", "054": "Gublins Barbacoa", "055": "Guisante Snacks", "056": "Maiz Barbacoa", "057": "Mix Frutos Secos", "058": "Patatas Onduladas", "059": "Crackers Tuc", "060": "Pipas Velarte", "061": "Borges Natura", "062": "Natuchips Barba.", "063": "Natuchips Tomate", "064": "Craaks Lentejas", "065": "Bocaditos T&O", "066": "Veggie Carrot", "067": "Cebolla y Nata", "068": "Vegee BIO", "069": "Pistacho 40g", "070": "Ens. Pasta Atun", "071": "Lasaña Boloñesa", "072": "Macarrones Boloñ.", "073": "Ens. Arroz", "074": "Fideuá 250g", "075": "Albóndigas Tomate", "076": "Ternera Jardinera", "077": "Ens. Pasta Jamon", "078": "Bifrutas Medit.", "079": "Bifrutas Pacif.", "080": "Bifrutas Tropi.", "081": "Bifrutas Ibiza", "082": "Cacaolat 200ml", "083": "Zumo Melocoton", "084": "Agua Bezoya 50cl", "085": "Coca-Cola Zero", "086": "Coca-Cola 330ml", "087": "Fanta Naranja", "088": "Fanta Limon", "089": "Aquarius Naranja", "090": "Aquarius Limon", "091": "Nestea 330ml", "092": "Red Bull 250ml", "093": "Estrella 330ml", "094": "Cerveza Sin", "095": "Agua Con Gas"
};

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() { procesar(reader.result); };
    reader.readAsText(e.target.files[0]);
});

function procesar(data) {
    const lineas = data.split('\n');
    let tbody = document.getElementById('tablaVentas');
    tbody.innerHTML = "";
    let totalEfectivo = 0;
    const fechaActual = new Date();

    lineas.forEach(linea => {
        const c = linea.split('*');
        
        // Identificar Cliente por el Número de Serie (CA1)
        if (c[0] === "CA1") {
            const serie = c[1];
            document.getElementById('nombreCliente').innerText = clientesMap[serie] || "Desconocido (" + serie + ")";
        }

        if (c[0] === "LA1") {
            const id = c[2];
            const unidades = parseInt(c[4]);
            const precio = parseInt(c[3]) / 100;
            const fechaDEX = c[5];

            if (unidades >= 0) {
                totalEfectivo += (unidades * precio);
                const nombre = productosNombres[id] || "ID: " + id;
                
                let estadoHTML = '<span class="status-badge ok">ACTIVO</span>';
                
                if (unidades === 0 && fechaDEX) {
                    const dia = parseInt(fechaDEX.substring(0,2));
                    const mes = parseInt(fechaDEX.substring(2,4)) - 1;
                    const año = 2000 + parseInt(fechaDEX.substring(4,6));
                    const fechaUltVenta = new Date(año, mes, dia);
                    const diffDias = (fechaActual - fechaUltVenta) / (1000 * 60 * 60 * 24);
                    
                    if (diffDias > 30) {
                        estadoHTML = '<span class="status-badge alerta-mes">ESTANCADO >30D</span>';
                    }
                }

                tbody.innerHTML += `
                    <tr>
                        <td><b>${nombre}</b></td>
                        <td style="text-align:center">${unidades}</td>
                        <td style="text-align:center"><input type="number" class="stock-input" value="${unidades}"></td>
                        <td>${estadoHTML}</td>
                    </tr>`;
            }
        }

        if (c[0] === "CA3") {
            const cambio = parseInt(c[2]) / 100;
            document.getElementById('cambioStatus').innerHTML = cambio < 10 ? 
                `<p class="alerta">⚠️ RELLENAR CAMBIO: ${cambio.toFixed(2)}€</p>` : 
                `<p class="success" style="font-size:0.8rem">✅ Cambio OK (${cambio.toFixed(2)}€)</p>`;
        }
    });

    document.getElementById('recaudacion').innerText = totalEfectivo.toFixed(2);
    document.getElementById('resultado').style.display = "block";
    iniciarQR();
}

function iniciarQR() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
        (text) => {
            document.getElementById('qr-result').innerText = "✅ Bolsa: " + text;
            scanner.stop();
        }
    ).catch(err => {});
}

function guardarDatos() {
    alert("Cierre finalizado para " + document.getElementById('nombreCliente').innerText);
}
</script>
</body>
</html>
