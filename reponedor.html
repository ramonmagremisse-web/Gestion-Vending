<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vending Pro - Gestión Total</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #1e8e3e; --bg: #f4f7f9; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: var(--bg); color: #333; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { color: var(--blue); font-size: 1.2rem; text-align: center; margin: 0; }
        h3 { font-size: 0.9rem; margin-bottom: 10px; border-bottom: 2px solid var(--blue); display: inline-block; color: #555; text-transform: uppercase; }
        
        /* Informe de Carga */
        .prep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .prep-item { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #d1e3fa; display: flex; flex-direction: column; }
        .prep-label { font-size: 0.65rem; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .prep-val { font-size: 1.1rem; font-weight: bold; color: var(--blue); }

        /* Tabla Filtrada */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: #f8f9fa; color: #666; font-size: 0.7rem; text-transform: uppercase; padding: 10px 5px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px 5px; vertical-align: middle; }
        
        .stock-input { width: 45px; padding: 8px; border: 2px solid var(--blue); border-radius: 6px; text-align: center; font-weight: bold; font-size: 1rem; background: #e3f2fd; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; display: inline-block; }
        .alerta-mes { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .movimiento { background: #e8f5e9; color: var(--green); border: 1px solid #c8e6c9; }

        .producto-fila { transition: background-color 3s linear; }
        .producto-fila:active { background-color: #bbdefb !important; }

        /* Escáner Full Screen */
        #modalScanner { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:white; text-align:center; padding-top:20px; }
        #reader { width: 90%; max-width: 400px; margin: 20px auto; border-radius: 15px; overflow: hidden; background: #000; }
        
        .btn-save { margin-top:10px; width:100%; padding:18px; background: var(--blue); color:white; border:none; border-radius:12px; font-weight:bold; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .btn-qr { margin-top:20px; width:100%; padding:15px; background: var(--dark); color:white; border:none; border-radius:12px; font-weight:bold; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-cancel { margin-top:20px; padding:12px 25px; background:#444; color:white; border:none; border-radius:8px; font-weight:bold; }
        
        #qr-result-box { margin-top: 10px; padding: 10px; background: #e8f5e9; color: var(--green); border-radius: 8px; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="modalScanner">
    <h2 id="scanner-title" style="margin:10px 0;">📷 ESCANEANDO...</h2>
    <div id="reader"></div>
    <button class="btn-cancel" onclick="cerrarScanner()">CANCELAR</button>
</div>

<div class="card">
    <h1>📦 Reposición Inteligente</h1>
    <input type="file" id="fileInput" accept=".txt" style="margin-top:15px; width:100%;">
</div>

<div id="resultado" style="display:none;">
    <div class="card" style="background: #e8f0fe; border: 1px solid var(--blue);">
        <h3>🚚 Carga de Solubles</h3>
        <div id="informeGramajes" class="prep-grid"></div>
    </div>

    <div class="card">
        <span id="nombreCliente" style="color:var(--blue); font-weight:bold; font-size:1.2rem; display:block;">---</span>
    </div>

    <div class="card">
        <p style="font-size:0.7rem; color:var(--red); font-weight:bold; margin-bottom:10px;">⚠️ MANTÉN PULSADO 3s PARA SUSTITUIR PRODUCTO</p>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th style="text-align:center;">Ventas</th>
                        <th style="text-align:center;">Cargar</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>

        <button class="btn-qr" onclick="abrirScanner('QR_BOLSA')">
            <span>📷</span> ESCANEAR QR BOLSA RECAUDACIÓN
        </button>
        <div id="qr-result-box"></div>

        <button class="btn-save" onclick="guardarTodo()">FINALIZAR REPOSICIÓN</button>
    </div>
</div>

<script>
const clientesMap = { "J9190400006F": "Consell Comarcal" };
const productosNombres = {
    "001": "Ristreto/Espresso", "002": "Cafe Largo", "003": "Cafe Cortado", "004": "Cafe con leche", "005": "Capuchino", "006": "Mocachino", "007": "Leche Manchada", "008": "Espresso (Desc.)", "009": "Largo (Desc.)", "010": "Cortado (Desc.)", "011": "C. Leche (Desc.)", "012": "Capuchino (Desc.)", "013": "Mocachino (Desc.)", "014": "L. Manchada (Desc.)", "015": "Leche", "016": "Te al Limon", "017": "Capuchino Avellana", "018": "Capuchino Vainilla", "019": "Irish Coffe", "020": "Chocolate", "021": "Choco Leche", "022": "Caña Choco", "023": "Chips Ahoy 40g", "024": "Croissant 65g", "025": "Galleta Colacao", "026": "Donettes 95g", "027": "M&M Cacahuete", "028": "Haribo Favoritos", "029": "Filipinos Blancos", "030": "Filipinos Negros", "031": "Galleta Gorriaga", "032": "Huesitos x2", "033": "Kinder Bueno", "034": "Kit Kat", "035": "Mikado", "036": "Oreo 66g", "084": "Agua Bezoya", "085": "Coca-Cola Zero", "086": "Coca-Cola 330ml"
};

let html5QrCode = null;
let posActualCambio = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() { procesar(reader.result); };
    reader.readAsText(e.target.files[0]);
});

function procesar(data) {
    const lineas = data.split('\n');
    let listaVentas = [];
    let totales = { cafe: 0, leche: 0, choco: 0, te: 0, desc: 0 };
    const hoy = new Date();

    lineas.forEach(linea => {
        const c = linea.split('*');
        if (c[0] === "CA1") document.getElementById('nombreCliente').innerText = clientesMap[c[1]] || "Cliente ID: " + c[1];
        
        if (c[0] === "LA1") {
            const id = c[2];
            const idN = parseInt(id);
            const uds = parseInt(c[4]);
            const fDEX = c[5];
            let alerta = "";

            if (uds > 0) {
                alerta = "REPOSICIÓN";
                if (idN >= 1 && idN <= 7) totales.cafe += (uds * 8);
                if (idN >= 8 && idN <= 14) totales.desc += (uds * 1.4);
                if (["003","005","010","012","021"].includes(id)) totales.leche += (uds * 3);
                if (id === "004" || id === "011") totales.leche += (uds * 4.5);
                if (id === "015") totales.leche += (uds * 9);
                if (["020","021"].includes(id)) totales.choco += (uds * 17);
                if (id === "016") totales.te += (uds * 6.9);
            } else if (fDEX) {
                const f = new Date(2000+parseInt(fDEX.substring(4,6)), parseInt(fDEX.substring(2,4))-1, parseInt(fDEX.substring(0,2)));
                if ((hoy - f)/(1000*60*60*24) > 30) alerta = "ESTANCADO";
            }
            // Solo añadir si la línea LA1 existe en el archivo
            listaVentas.push({ id, idN, nombre: productosNombres[id] || "ID: "+id, uds, alerta });
        }
    });

    document.getElementById('informeGramajes').innerHTML = `
        <div class="prep-item"><span class="prep-label">Café Grano</span><span class="prep-val">${totales.cafe}g</span></div>
        <div class="prep-item"><span class="prep-label">Leche</span><span class="prep-val">${totales.leche.toFixed(0)}g</span></div>
        <div class="prep-item"><span class="prep-label">Chocolate</span><span class="prep-val">${totales.choco}g</span></div>
        <div class="prep-item"><span class="prep-label">Descaf.</span><span class="prep-val">${totales.desc.toFixed(1)}g</span></div>
    `;

    listaVentas.sort((a, b) => {
        const aC = a.idN <= 21; const bC = b.idN <= 21;
        if (aC && !bC) return 1; if (!aC && bC) return -1;
        return b.uds - a.uds;
    });

    renderTabla(listaVentas);
    document.getElementById('resultado').style.display = "block";
}

function renderTabla(lista) {
    const tbody = document.getElementById('tablaVentas');
    tbody.innerHTML = "";
    lista.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "producto-fila";
        if (p.idN <= 21) tr.style.backgroundColor = "#fafafa";
        let badge = p.alerta === "REPOSICIÓN" ? `<span class="status-badge movimiento">CARGAR</span>` : (p.alerta === "ESTANCADO" ? `<span class="status-badge alerta-mes">INACTIVO</span>` : "");
        
        tr.innerHTML = `
            <td id="row-${p.id}"><b>${p.nombre}</b><br><small style="color:#888">Pos: ${p.id}</small></td>
            <td style="text-align:center; font-weight:bold; color:${p.uds > 0 ? 'var(--red)' : '#888'}">${p.uds}</td>
            <td style="text-align:center"><input type="number" class="stock-input" value="${p.uds}"></td>
            <td>${badge}</td>
        `;

        let timer;
        const start = () => timer = setTimeout(() => abrirScanner('CAMBIO', p.id), 3000);
        const end = () => clearTimeout(timer);
        tr.onpointerdown = start; tr.onpointerup = end; tr.onpointerleave = end;

        tbody.appendChild(tr);
    });
}

function abrirScanner(modo, id = null) {
    posActualCambio = id;
    document.getElementById('modalScanner').style.display = "block";
    document.getElementById('scanner-title').innerText = modo === 'QR_BOLSA' ? '📷 BOLSA SEGURIDAD' : '📷 NUEVO PRODUCTO';
    
    html5QrCode = new Html5QrCode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
        if (modo === 'QR_BOLSA') {
            const res = document.getElementById('qr-result-box');
            res.style.display = "block";
            res.innerText = "✅ Bolsa vinculada: " + text;
        } else {
            document.getElementById(`row-${posActualCambio}`).innerHTML = `<b>NUEVO: ${text}</b><br><small style="color:orange; font-weight:bold;">Sustitución en Pos: ${posActualCambio}</small>`;
        }
        cerrarScanner();
    }).catch(err => console.error(err));
}

function cerrarScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('modalScanner').style.display = "none";
            html5QrCode = null;
        }).catch(() => document.getElementById('modalScanner').style.display = "none");
    } else {
        document.getElementById('modalScanner').style.display = "none";
    }
}

function guardarTodo() {
    alert("Reposición finalizada con éxito.");
}
</script>
</body>
</html>
