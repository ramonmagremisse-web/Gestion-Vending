<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vending Pro - Consell Comarcal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #1e8e3e; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: var(--bg); color: #333; margin: 0; user-select: none; }
        .card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { color: var(--blue); font-size: 1.2rem; text-align: center; margin: 0; }
        h3 { font-size: 1rem; margin-bottom: 10px; border-bottom: 2px solid var(--blue); display: inline-block; }
        
        .prep-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; font-weight: bold; }
        .prep-val { color: var(--blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: #f8f9fa; color: #666; font-size: 0.7rem; padding: 10px 5px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px 5px; }
        .stock-input { width: 40px; padding: 6px; border: 1px solid var(--blue); border-radius: 4px; text-align: center; font-weight: bold; }
        
        .producto-fila { transition: background-color 3s linear; }
        .producto-fila:active { background-color: #bbdefb !important; }

        #modalScanner { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; color:white; text-align:center; padding-top:40px; }
        #barcode-reader { width: 90%; max-width: 350px; margin: auto; border: 2px solid var(--blue); border-radius: 12px; overflow: hidden; }
        .btn-save { margin-top:20px; width:100%; padding:18px; background: var(--blue); color:white; border:none; border-radius:10px; font-weight:bold; }
    </style>
</head>
<body>

<div id="modalScanner">
    <h2>📷 CAMBIAR PRODUCTO</h2>
    <div id="barcode-reader"></div>
    <button onclick="cerrarScanner()" style="margin-top:20px; padding:10px;">CANCELAR</button>
</div>

<div class="card">
    <h1>📊 Gestión de Reposición</h1>
    <input type="file" id="fileInput" accept=".txt" style="margin-top:15px; width:100%;">
</div>

<div id="resultado" style="display:none;">
    <div class="card" style="background: #e8f0fe; border: 1px solid var(--blue);">
        <h3>🚚 Preparación de Carga (Solubles)</h3>
        <div id="informeGramajes"></div>
    </div>

    <div class="card">
        <span id="nombreCliente" style="color:var(--blue); font-weight:bold; font-size:1.2rem;">---</span>
    </div>

    <div class="card">
        <p style="font-size:0.7rem; color:red; font-weight:bold;">⚠️ PULSA 3s PARA ESCANEAR CAMBIO EN ESPIRAL</p>
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th style="text-align:center;">Faltan</th>
                    <th style="text-align:center;">Cargar</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>
        <button class="btn-save" onclick="guardarDatos()">FINALIZAR Y CERRAR</button>
    </div>
</div>

<script>
const clientesMap = { "J9190400006F": "Consell Comarcal" };
const productosNombres = {
    "001": "Ristreto/Espresso", "002": "Cafe Largo", "003": "Cafe Cortado", "004": "Cafe con leche", "005": "Capuchino", "006": "Mocachino", "007": "Leche Manchada", "008": "Espresso (Desc.)", "009": "Largo (Desc.)", "010": "Cortado (Desc.)", "011": "C. Leche (Desc.)", "012": "Capuchino (Desc.)", "013": "Mocachino (Desc.)", "014": "L. Manchada (Desc.)", "015": "Leche", "016": "Te al Limon", "017": "Capuchino Avellana", "018": "Capuchino Vainilla", "019": "Irish Coffe", "020": "Chocolate", "021": "Choco Leche", "022": "Caña Choco", "023": "Chips Ahoy 40g", "084": "Agua Bezoya", "085": "Coca-Cola Zero", "086": "Coca-Cola 330ml"
};

let scannerBarras = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() { procesar(reader.result); };
    reader.readAsText(e.target.files[0]);
});

function procesar(data) {
    const lineas = data.split('\n');
    let listaVentas = [];
    let totales = { cafe: 0, leche: 0, chocolate: 0, te: 0, descafeinado: 0, capuAutor: 0 };

    lineas.forEach(linea => {
        const c = linea.split('*');
        if (c[0] === "CA1") document.getElementById('nombreCliente').innerText = clientesMap[c[1]] || "Cliente: " + c[1];

        if (c[0] === "LA1") {
            const id = c[2];
            const idNum = parseInt(id);
            const uds = parseInt(c[4]);
            
            if (uds >= 0) {
                listaVentas.push({ id: id, idNum: idNum, nombre: productosNombres[id] || "ID: "+id, unidades: uds });
                
                if (uds > 0) {
                    // 1. Café en Grano (8gr) -> Solo del 1 al 7
                    if (idNum >= 1 && idNum <= 7) totales.cafe += (uds * 8);

                    // 2. Descafeinado (1.4gr) -> Solo del 8 al 14
                    if (idNum >= 8 && idNum <= 14) totales.descafeinado += (uds * 1.4);

                    // 3. Leche
                    if (["003","005","010","012","021"].includes(id)) totales.leche += (uds * 3); // Cortados y Capu
                    if (id === "004" || id === "011") totales.leche += (uds * 4.5); // Café con leche
                    if (id === "015") totales.leche += (uds * 9); // Vaso leche

                    // 4. Chocolate (17gr)
                    if (["020","021"].includes(id)) totales.chocolate += (uds * 17);

                    // 5. Té Limón (6.9gr)
                    if (id === "016") totales.te += (uds * 6.9);

                    // 6. Capuchinos Autor (17gr)
                    if (["017","018"].includes(id)) totales.capuAutor += (uds * 17);
                }
            }
        }
    });

    document.getElementById('informeGramajes').innerHTML = `
        <div class="prep-item"><span>☕ Café en Grano:</span><span class="prep-val">${totales.cafe} gr</span></div>
        <div class="prep-item"><span>🌑 Descafeinado:</span><span class="prep-val">${totales.descafeinado.toFixed(1)} gr</span></div>
        <div class="prep-item"><span>🥛 Leche Polvo:</span><span class="prep-val">${totales.leche.toFixed(1)} gr</span></div>
        <div class="prep-item"><span>🍫 Chocolate:</span><span class="prep-val">${totales.chocolate} gr</span></div>
        <div class="prep-item"><span>🍋 Té Limón:</span><span class="prep-val">${totales.te.toFixed(1)} gr</span></div>
        <div class="prep-item"><span>✨ Capu. Autor:</span><span class="prep-val">${totales.capuAutor} gr</span></div>
    `;

    listaVentas.sort((a, b) => {
        const aEsCafe = (a.idNum <= 21); const bEsCafe = (b.idNum <= 21);
        if (aEsCafe && !bEsCafe) return 1; if (!aEsCafe && bEsCafe) return -1;
        return b.unidades - a.unidades;
    });

    renderizarTabla(listaVentas);
    document.getElementById('resultado').style.display = "block";
}

function renderizarTabla(lista) {
    const tbody = document.getElementById('tablaVentas');
    tbody.innerHTML = "";
    lista.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "producto-fila";
        if (p.idNum <= 21) tr.style.backgroundColor = "#f9f9f9";
        tr.innerHTML = `
            <td id="name-${p.id}"><b>${p.nombre}</b><br><small style="color:#999">Pos: ${p.id}</small></td>
            <td style="text-align:center; font-weight:bold; color:${p.unidades > 0 ? 'red' : '#777'}">${p.unidades}</td>
            <td style="text-align:center"><input type="number" class="stock-input" value="${p.unidades}"></td>
        `;
        let timer;
        tr.addEventListener('touchstart', () => timer = setTimeout(() => abrirScanner(p.id), 3000));
        tr.addEventListener('touchend', () => clearTimeout(timer));
        tbody.appendChild(tr);
    });
}

function abrirScanner(id) {
    if (window.navigator.vibrate) window.navigator.vibrate(100);
    document.getElementById('modalScanner').style.display = "block";
    scannerBarras = new Html5Qrcode("barcode-reader");
    scannerBarras.start({ facingMode: "environment" }, { fps: 15, qrbox: {width: 250, height: 150} },
        (codigo) => {
            document.getElementById(`name-${id}`).innerHTML = `<b>NUEVO: ${codigo}</b><br><small style="color:orange">Sustituye a ${id}</small>`;
            cerrarScanner();
        }
    ).catch(err => {});
}

function cerrarScanner() {
    if (scannerBarras) scannerBarras.stop().then(() => { document.getElementById('modalScanner').style.display = "none"; });
}

function guardarDatos() { alert("Reposición finalizada."); }
</script>
</body>
</html>
