<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Vending - Consell Comarcal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #3498db; color: white; }
        .alerta { color: red; font-weight: bold; }
        .resumen { font-size: 1.1rem; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <h1>📊 Cargar Auditoría Paytec</h1>
    <input type="file" id="fileInput" accept=".txt">
</div>

<div id="resultado" style="display:none;">
    <div class="card">
        <p>🆔 Máquina: <span id="matricula">---</span></p>
        <p class="resumen">💰 Total a Recaudar: <span id="recaudacion">0.00</span>€</p>
        <p id="cambioStatus"></p>
    </div>

    <div class="card">
        <h3>📦 Unidades Consumidas (Ventas)</h3>
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Unidades</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>
    </div>
</div>

<script>
const productosNombres = {
    "001": "Ristreto, Cafe Corto / Espresso", "002": "Cafe Largo", "003": "Cafe Cortado",
    "004": "Cafe con leche", "005": "Capuchino", "006": "Mocachino", "007": "Leche Manchada",
    "012": "Capuchino (Descafeinado)", "020": "Chocolate", "086": "Coca-Cola 330ml"
    // He añadido los que tienen ventas en tu archivo, puedes añadir el resto aquí...
};

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() {
        const lineas = reader.result.split('\n');
        procesarAuditoria(lineas);
    };
    reader.readAsText(e.target.files[0]);
});

function procesarAuditoria(lineas) {
    let tabla = document.getElementById('tablaVentas');
    tabla.innerHTML = "";
    let totalEfectivo = 0;

    lineas.forEach(linea => {
        const campo = linea.split('*');

        // Matrícula de la máquina
        if (campo[0] === "CA1") {
            document.getElementById('matricula').innerText = campo[1];
        }

        // Ventas por producto (Bloque PA)
        if (campo[0] === "PA2") {
            // El formato de Paytec en PA2 suele ser: PA2 * VentasEfectivo * VentasEfectivoTotal * Unidades * ValorTotal
            const unidades = parseInt(campo[3]);
            const valor = parseInt(campo[4]) / 100;
            
            if (unidades > 0) {
                // Buscamos el nombre del producto en la línea anterior (PA1)
                // Para simplificar en este ejemplo, usamos el índice correlativo si no lo tenemos en el mapa
                const row = `<tr>
                    <td>Producto #${tabla.rows.length + 1}</td>
                    <td>${unidades}</td>
                    <td>${(valor/unidades).toFixed(2)}€</td>
                    <td>${valor.toFixed(2)}€</td>
                </tr>`;
                tabla.innerHTML += row;
                totalEfectivo += valor;
            }
        }

        // Estado del cambio (CA3)
        if (campo[0] === "CA3") {
            const monedasCambio = parseInt(campo[2]) / 100;
            const status = document.getElementById('cambioStatus');
            if (monedasCambio < 10) {
                status.innerHTML = `<span class="alerta">⚠️ FALTA CAMBIO: Solo hay ${monedasCambio}€</span>`;
            } else {
                status.innerHTML = `✅ Cambio OK: ${monedasCambio}€ en tubos.`;
            }
        }
    });

    document.getElementById('recaudacion').innerText = totalEfectivo.toFixed(2);
    document.getElementById('resultado').style.display = "block";
}
</script>
</body>
</html>
