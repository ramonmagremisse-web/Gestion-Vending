<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposición Vending Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f4f7f9; color: #333; user-select: none; -webkit-tap-highlight-color: transparent; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { color: #1a73e8; font-size: 1.2rem; text-align: center; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 5px; text-align: left; }
        
        .stock-input { width: 45px; padding: 6px; border: 1px solid #1a73e8; border-radius: 4px; text-align: center; font-weight: bold; }
        
        /* Animación de pulsación larga */
        .producto-fila { transition: background-color 3s linear; }
        .producto-fila:active { background-color: #bbdefb !important; } /* Se vuelve azul mientras pulsas */

        #modalScanner { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; color:white; text-align:center; padding-top:40px; }
        #barcode-reader { width: 100%; max-width: 350px; margin: auto; border: 2px solid #1a73e8; border-radius: 10px; overflow: hidden; }
        .btn-cancel { margin-top:30px; padding:12px 25px; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; }
        .btn-save { margin-top:15px; width:100%; padding:15px; background:#1a73e8; color:white; border:none; border-radius:8px; font-weight:bold; }
    </style>
</head>
<body>

<div id="modalScanner">
    <h2 style="margin-bottom:20px;">📷 ESCANEAR NUEVO PRODUCTO</h2>
    <div id="barcode-reader"></div>
    <p style="margin-top:20px; padding:0 20px;">Enfoque el código de barras del nuevo producto para sustituirlo en esta posición.</p>
    <button class="btn-cancel" onclick="cerrarScanner()">CANCELAR</button>
</div>

<div class="card">
    <h1>📦 Hoja de Reposición</h1>
    <input type="file" id="fileInput" accept=".txt" style="margin-top:15px; width:100%;">
</div>

<div id="resultado" style="display:none;">
    <div class="card">
        <span id="nombreCliente" style="color:#1a73e8; font-weight:bold; font-size:1.2rem;">---</span>
    </div>

    <div class="card">
        <p style="font-size:0.75rem; color:#d32f2f; font-weight:bold;">⚠️ MANTÉN PULSADO 3 SEGUNDOS PARA CAMBIAR PRODUCTO</p>
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th style="text-align:center;">Faltan</th>
                    <th style="text-align:center;">Cargar</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>
        <button class="btn-save" onclick="guardarDatos()">Finalizar Carga</button>
    </div>
</div>

<script>
const clientesMap = { "J9190400006F": "Consell Comarcal" };
const productosNombres = { /* Tu lista de 100 productos aquí */ };
let actualIdParaCambiar = null;
let scannerBarras = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function() { procesar(reader.result); };
    reader.readAsText(e.target.files[0]);
});

function procesar(data) {
    const lineas = data.split('\n');
    let lista = [];
    lineas.forEach(linea => {
        const c = linea.split('*');
        if (c[0] === "CA1") document.getElementById('nombreCliente').innerText = clientesMap[c[1]] || c[1];
        if (c[0] === "LA1") {
            lista.push({ id: c[2], nombre: productosNombres[c[2]] || "ID: "+c[2], unidades: parseInt(c[4]) });
        }
    });
    render(lista);
    document.getElementById('resultado').style.display = "block";
}

function render(lista) {
    const tbody = document.getElementById('tablaVentas');
    tbody.innerHTML = "";
    lista.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "producto-fila";
        // Estilo diferente para café (1-21) como pediste
        if (parseInt(p.id) <= 21) tr.style.backgroundColor = "#f9f9f9";

        tr.innerHTML = `
            <td id="name-${p.id}"><b>${p.nombre}</b><br><small style="color:#999">Cod: ${p.id}</small></td>
            <td style="text-align:center; font-weight:bold; color:${p.unidades > 0 ? '#d93025' : '#777'}">${p.unidades}</td>
            <td style="text-align:center"><input type="number" class="stock-input" value="${p.unidades}"></td>
        `;
        
        // LÓGICA DE 3 SEGUNDOS (LONG PRESS)
        let timer;
        const iniciarPresion = () => {
            timer = setTimeout(() => abrirScanner(p.id), 3000); // 3000 ms = 3 segundos
        };
        const cancelarPresion = () => clearTimeout(timer);

        tr.addEventListener('touchstart', iniciarPresion);
        tr.addEventListener('touchend', cancelarPresion);
        tr.addEventListener('mousedown', iniciarPresion); // Para PC
        tr.addEventListener('mouseup', cancelarPresion);  // Para PC
        
        tbody.appendChild(tr);
    });
}

function abrirScanner(id) {
    actualIdParaCambiar = id;
    window.navigator.vibrate(100); // Vibra al activarse (si el móvil lo permite)
    document.getElementById('modalScanner').style.display = "block";
    scannerBarras = new Html5Qrcode("barcode-reader");
    scannerBarras.start({ facingMode: "environment" }, { fps: 15, qrbox: {width: 250, height: 150} },
        (codigo) => {
            document.getElementById(`name-${actualIdParaCambiar}`).innerHTML = `<b>NUEVO: ${codigo}</b><br><small style="color:#e65100; font-weight:bold;">Sustituye a ${actualIdParaCambiar}</small>`;
            cerrarScanner();
        }
    ).catch(err => console.error(err));
}

function cerrarScanner() {
    if(scannerBarras) {
        scannerBarras.stop().then(() => {
            document.getElementById('modalScanner').style.display = "none";
        });
    } else {
        document.getElementById('modalScanner').style.display = "none";
    }
}

function guardarDatos() {
    alert("Hoja de carga guardada.");
}
</script>
</body>
</html>
