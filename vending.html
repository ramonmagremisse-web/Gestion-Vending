<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vending Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; --red: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .login { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .pin-input { width: 70%; padding: 15px; font-size: 2rem; text-align: center; border: 2px solid #ddd; border-radius: 12px; margin: 20px 0; -webkit-text-security: disc; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-blue { background: var(--blue); color: white; }
        .grid-g { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .box-g { background: #f0f7ff; padding: 10px; border-radius: 10px; border: 1px solid #cce3ff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; }
        .qty { font-weight: bold; color: var(--red); text-align: center; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div id="login" class="login">
    <h2>Vending Access</h2>
    <input type="number" id="pin" class="pin-input" placeholder="••••" inputmode="numeric">
    <button class="btn btn-blue" onclick="entrar()" style="width:70%">ENTRAR</button>
</div>

<div id="app" style="display:none">
    <div class="card">
        <h3 style="margin-top:0; color:var(--blue)">📦 Cargar Archivo DEX</h3>
        <input type="file" id="archivo" accept=".txt" style="width:100%">
    </div>

    <div id="res" style="display:none">
        <div class="card" style="background:#007aff; color:white;">
            <div id="cliente" style="font-weight:bold; font-size:1.2rem; margin-bottom:10px;">Cliente</div>
            <div class="grid-g" id="gramos"></div>
        </div>

        <div class="card">
            <h3>📊 Productos Vendidos</h3>
            <table id="tabla"></table>
        </div>

        <div class="card">
            <button class="btn" style="background:#333; color:white" onclick="escanear()">📷 ESCANEAR QR BOLSA</button>
            <p id="qr-txt" style="text-align:center; font-weight:bold; color:green"></p>
            <input type="number" id="dinero" placeholder="Efectivo €" step="0.01" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; border:1px solid #ddd; font-size:1.2rem; text-align:center; box-sizing:border-box;">
            <button class="btn" style="background:#34c759; color:white" onclick="enviar()">💾 GUARDAR EN EXCEL</button>
        </div>
    </div>
</div>

<div id="scanner" style="display:none; position:fixed; inset:0; background:black; z-index:2000; padding-top:50px;">
    <div id="reader"></div>
    <button class="btn" onclick="pararScanner()" style="background:red; color:white; margin-top:20px;">CANCELAR</button>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyuBi1eepFl3mT-0Qr8qnZc_tpSlMC_PJRTAylV3JNNuHRq7jWQPumvUGUYkcGTevaI/exec";
    let DB = null;
    let totales = {c:0, l:0, ch:0, d:0};
    let bolsa = "No escaneada";
    let qrcode = null;

    async function entrar() {
        if(document.getElementById('pin').value !== "3320") return alert("PIN Incorrecto");
        try {
            const r = await fetch(URL_SCRIPT);
            DB = await r.json();
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        } catch(e) { alert("Error al conectar. Verifica que el Script de Google sea público."); }
    }

    document.getElementById('archivo').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const lineas = reader.result.split('\n');
            totales = {c:0, l:0, ch:0, d:0};
            let html = "";
            
            lineas.forEach(l => {
                const f = l.split('*');
                if(f[0] === "CA1") document.getElementById('cliente').innerText = "📍 " + (DB.clientes[f[1].trim()] || f[1]);
                if(f[0] === "LA1") {
                    const id = f[2].trim().padStart(3, '0');
                    const uds = parseInt(f[4]) || 0;
                    if(uds > 0 && DB.gramajes[id]) {
                        const g = DB.gramajes[id];
                        totales.c += uds * g.cafe;
                        totales.l += uds * g.leche;
                        totales.ch += uds * g.choco;
                        totales.d += uds * g.descaf;
                        html += `<tr><td><b>${g.nombre}</b><br><small>ID: ${id}</small></td><td class="qty">${uds} uds</td></tr>`;
                    }
                }
            });

            document.getElementById('gramos').innerHTML = `
                <div class="box-g"><b>${Math.round(totales.c)}g</b><br><span>CAFÉ</span></div>
                <div class="box-g"><b>${Math.round(totales.l)}g</b><br><span>LECHE</span></div>
                <div class="box-g"><b>${Math.round(totales.ch)}g</b><br><span>CHOCO</span></div>
                <div class="box-g"><b>${totales.d.toFixed(1)}g</b><br><span>DESCAF</span></div>`;
            document.getElementById('tabla').innerHTML = html;
            document.getElementById('res').style.display = 'block';
        };
        reader.readAsText(e.target.files[0]);
    };

    function escanear() {
        document.getElementById('scanner').style.display = 'block';
        qrcode = new Html5QrCode("reader");
        qrcode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            bolsa = txt;
            document.getElementById('qr-txt').innerText = "✅ Bolsa: " + txt;
            pararScanner();
        });
    }

    function pararScanner() {
        if(qrcode) qrcode.stop().then(() => { document.getElementById('scanner').style.display = 'none'; });
    }

    async function enviar() {
        const cash = document.getElementById('dinero').value;
        if(!cash) return alert("Indica el dinero");
        const data = {
            cliente: document.getElementById('cliente').innerText,
            cafe: Math.round(totales.c), leche: Math.round(totales.l),
            choco: Math.round(totales.ch), descaf: totales.d.toFixed(1),
            efectivo: cash, bolsa: bolsa
        };
        await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(data) });
        alert("✅ Guardado");
        location.reload();
    }
</script>
</body>
</html>
